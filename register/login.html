<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="register.css">
    <style>
        .success {
            color: #f44313;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <br><br><br><br><br><br>
    <div class="container">
        <div class="joindiv">
            <div class="circlediv">
                <div class="cir1"></div>
            </div>
            <div class="ja">
                <div class="jc">
                    <div class="join">LOGIN USER</div>
                    <div class="account">Login to get started</div>
                </div>
            </div>
            <div class="circlediv">
                <div class="cir2"></div>
            </div>
        </div>
        <div class="signdiv">
            <div class="sf">
                <h1 class="signup" style="color: #f44313;">LOGIN USER</h1>
                <form action="../customer-profile/profile.html" method="GET" onsubmit="handleLogin(event)">
                    <div class="form-container">
                        <div>
                            <input type="text" name="user_name" required placeholder="Enter your user name">
                        </div>

                        <div>
                            <input type="password" name="password" required placeholder="Password">
                        </div>

                        <div>
                            <input type="submit" name="submit" value="Login" class="signupm" style="cursor: pointer;">
                        </div>

                        <div>
                            <p>Don't have an account? <a href="./register.html" style="text-align:center;">Create account</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            alert("Login successful! Welcome.");
        }
    </script>
</body>
</html>
