<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <!-- Navigation -->
    <div class="container">
        <div class="logo">
            <a href="../index.html"><img src="../src/logo.png" alt="logo" width="50px"></a>
            <p>Welcome guest</p>
            <a href="../register/login.html" class="login">Logout</a>
        </div>

        <div class="menu menu-bar">
            <img src="../src/logo.png" class="profile-img" id="profile-img" style="border-radius:50%;">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="../menu-bar/foods.html">Foods</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </div>

    <div class="profile-dialog" id="profile-dialog">
        <p class="email">guest@example.com</p>
        <hr>
        <a href="../customer-profile/profile.html" class="account" style="text-decoration: none; color: black">Profile &amp; account</a>
        <hr>
        <a href="../register/login.html" style="text-decoration: none; color: black" class="out">Sign Out</a>
    </div>

    <table border="1px" class="table">
        <tr>
            <th>No:</th>
            <th>Product Title</th>
            <th>Product Image</th>
            <th>Quantity</th>
            <th>Total Price</th>
            <th>Remove</th>
            <th>Operations</th>
            <th>Operations</th>
        </tr>

        <tr>
            <td>1.</td>
            <td>Banku</td>
            <td>Banku</td>
            <td><input type="text"></td>
            <td>GH&#8373; 50</td>
            <td><input type="checkbox"></td>
            <td><a href="#" class="update_btn">Update Cart</a></td>
            <td><a href="#" class="delete_btn">Remove Item</a></td>
        </tr>
    </table>

    <div class="total">
        <h2>Subtotal: GH&#8373; 50</h2>
        <a href="payment.html" class="continue_btn">Continue Shopping</a>
        <a href="#" class="check_btn">Checkout</a>
    </div>

    <script>
        let profile_img = document.getElementById("profile-img");
        let profile_dialog = document.getElementById("profile-dialog");

        profile_img.addEventListener("click", () => {
            if (profile_dialog.style.display === "none") {
                profile_dialog.style.display = "block";
            } else {
                profile_dialog.style.display = "none";
            }
        });
    </script>
</body>
</html>
